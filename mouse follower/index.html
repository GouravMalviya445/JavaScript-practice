<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        html,body{
            height: 100%;
            width: 100%;
            background-color: #000;
            overflow-x:  hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        h1{
            color: #fff;
            font-size: 200px;
            font-family: sans-serif;
            text-transform: uppercase;
            pointer-events: none;
        }
        .dot{
            height: 15px;
            width: 15px;
            background-color: greenyellow;
            border-radius: 50%;
            position: absolute;
            transition: all .1s linear;
        }
    </style>
</head>
<body>
    <div class="dot"></div>
    <h1>Gorurav</h1>
    
    <script src="script.js"></script>
</body>
</html>
